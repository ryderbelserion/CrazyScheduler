name: Snapshot Build

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build:
    uses: ryderbelserion/ryderbelserion/.github/workflows/build.yml@main

    with:
      platforms: "modrinth"
      status: "beta"
      branch: main

    secrets:
      webhook: ${{ secrets.CS_WEBHOOK }}
      modrinth_token: ${{ secrets.MODRINTH_TOKEN }}
      hangar_token: ${{ secrets.HANGAR_KEY }}